<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FlashDeck</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f11;
    --surface: #17171c;
    --surface2: #1e1e26;
    --surface3: #252530;
    --border: #2a2a38;
    --accent: #7c6af7;
    --accent2: #b8abff;
    --accent-glow: rgba(124, 106, 247, 0.18);
    --wrong: #f76a6a;
    --wrong-glow: rgba(247, 106, 106, 0.15);
    --correct: #5de8a4;
    --text: #f0eff8;
    --text2: #9997b3;
    --text3: #5e5c7a;
    --radius: 16px;
    --radius-sm: 10px;
    --shadow: 0 8px 32px rgba(0,0,0,0.45);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow: hidden; }

  /* LAYOUT */
  .app { display: flex; height: 100vh; height: 100dvh; }
  .sidebar {
    width: 280px; min-width: 280px; background: var(--surface);
    border-right: 1px solid var(--border); display: flex; flex-direction: column;
    transition: transform 0.3s cubic-bezier(.4,0,.2,1), opacity 0.3s;
    z-index: 10;
  }
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* SIDEBAR HEADER */
  .sidebar-header {
    padding: 20px 20px 14px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .logo { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--accent2); letter-spacing: -0.5px; }
  .logo span { color: var(--text3); font-size: 13px; font-family: 'DM Sans', sans-serif; font-weight: 400; display: block; margin-top: -2px; }
  .sidebar-actions { margin-left: auto; display: flex; gap: 6px; }
  .icon-btn {
    width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border);
    background: transparent; color: var(--text2); cursor: pointer; display: flex;
    align-items: center; justify-content: center; font-size: 16px;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .icon-btn:hover { background: var(--surface2); color: var(--text); border-color: var(--accent); }

  /* FOLDER LIST */
  .folder-list { flex: 1; overflow-y: auto; padding: 12px 10px; }
  .folder-list::-webkit-scrollbar { width: 4px; }
  .folder-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .folder-item {
    border-radius: var(--radius-sm); margin-bottom: 2px;
    transition: background 0.15s; position: relative;
  }
  .folder-header {
    display: flex; align-items: center; gap: 8px; padding: 9px 10px;
    cursor: pointer; border-radius: var(--radius-sm); user-select: none;
    transition: background 0.15s;
  }
  .folder-header:hover { background: var(--surface2); }
  .folder-header.active { background: var(--accent-glow); }
  .folder-icon { font-size: 16px; flex-shrink: 0; }
  .folder-name { font-size: 14px; font-weight: 500; flex: 1; truncate; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  .folder-meta { font-size: 11px; color: var(--text3); flex-shrink: 0; }
  .folder-chevron { font-size: 10px; color: var(--text3); flex-shrink: 0; transition: transform 0.2s; }
  .folder-chevron.open { transform: rotate(90deg); }
  .folder-dots { opacity: 0; transition: opacity 0.15s; flex-shrink: 0; cursor: pointer; font-size: 16px; color: var(--text3); padding: 2px 4px; border-radius: 4px; }
  .folder-header:hover .folder-dots { opacity: 1; }
  .folder-dots:hover { background: var(--surface3); color: var(--text); }

  /* DECK LIST inside folder */
  .deck-list { padding-left: 26px; overflow: hidden; }
  .deck-item {
    display: flex; align-items: center; gap: 8px; padding: 7px 10px;
    border-radius: var(--radius-sm); cursor: pointer; margin-bottom: 1px;
    transition: background 0.15s; position: relative;
  }
  .deck-item:hover { background: var(--surface2); }
  .deck-item.active { background: var(--accent-glow); }
  .deck-item.active .deck-name { color: var(--accent2); }
  .deck-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
  .deck-dot.wrong { background: var(--wrong); }
  .deck-name { font-size: 13px; flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  .deck-count { font-size: 11px; color: var(--text3); flex-shrink: 0; }
  .deck-dots { opacity: 0; transition: opacity 0.15s; flex-shrink: 0; cursor: pointer; font-size: 14px; color: var(--text3); padding: 2px 4px; border-radius: 4px; }
  .deck-item:hover .deck-dots { opacity: 1; }
  .deck-dots:hover { background: var(--surface3); color: var(--text); }

  /* MAIN HEADER */
  .main-header {
    padding: 16px 24px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px; background: var(--surface);
  }
  .menu-btn { display: none; }
  .main-title { font-family: 'DM Serif Display', serif; font-size: 22px; flex: 1; }
  .main-subtitle { font-size: 13px; color: var(--text2); }

  .header-actions { display: flex; gap: 8px; }
  .btn {
    padding: 8px 16px; border-radius: 8px; border: none; font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 6px;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #8f7fff; box-shadow: 0 0 0 3px var(--accent-glow); }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--surface3); border-color: var(--accent); }
  .btn-danger { background: transparent; color: var(--wrong); border: 1px solid rgba(247,106,106,0.3); }
  .btn-danger:hover { background: var(--wrong-glow); }

  /* MAIN CONTENT */
  .main-content { flex: 1; overflow-y: auto; padding: 24px; }
  .main-content::-webkit-scrollbar { width: 4px; }
  .main-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* HOME VIEW */
  .home-view {}
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px; text-align: center;
  }
  .stat-num { font-family: 'DM Serif Display', serif; font-size: 32px; color: var(--accent2); }
  .stat-label { font-size: 12px; color: var(--text2); margin-top: 4px; }

  .section-title { font-size: 12px; font-weight: 600; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 12px; }

  .deck-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
  .deck-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 18px; cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
    position: relative; overflow: hidden;
  }
  .deck-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }
  .deck-card.wrong-deck::before { background: linear-gradient(90deg, var(--wrong), #ff9a9a); }
  .deck-card:hover { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent), var(--shadow); transform: translateY(-2px); }
  .deck-card-name { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
  .deck-card-meta { font-size: 12px; color: var(--text2); display: flex; gap: 12px; }
  .deck-card-wrong { color: var(--wrong); font-size: 12px; margin-top: 8px; display: flex; align-items: center; gap: 4px; }

  /* STUDY VIEW */
  .study-view { max-width: 640px; margin: 0 auto; }
  .progress-bar-wrap { background: var(--surface2); border-radius: 100px; height: 4px; margin-bottom: 24px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 100px; transition: width 0.4s cubic-bezier(.4,0,.2,1); }

  .card-counter { text-align: center; font-size: 13px; color: var(--text3); margin-bottom: 20px; }
  .card-counter span { color: var(--text); font-weight: 600; }

  .flashcard-wrap {
    perspective: 1200px; margin-bottom: 28px; cursor: pointer;
  }
  .flashcard-inner {
    position: relative; transition: transform 0.6s cubic-bezier(.4,0,.2,1);
    transform-style: preserve-3d;
  }
  .flashcard-inner.flipped { transform: rotateY(180deg); }
  .flashcard-face {
    background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
    padding: 48px 36px; min-height: 240px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center;
    box-shadow: 0 16px 48px rgba(0,0,0,0.4);
    backface-visibility: hidden; -webkit-backface-visibility: hidden;
  }
  .flashcard-back {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    transform: rotateY(180deg);
    border-color: var(--accent); box-shadow: 0 16px 48px rgba(0,0,0,0.4), 0 0 0 1px var(--accent);
  }
  .card-hint { font-size: 11px; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 16px; }
  .card-text { font-family: 'DM Serif Display', serif; font-size: 26px; line-height: 1.4; color: var(--text); }
  .card-text-answer { font-size: 20px; line-height: 1.5; }

  .study-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .answer-btn {
    padding: 16px; border-radius: var(--radius); font-family: 'DM Sans', sans-serif;
    font-size: 15px; font-weight: 600; cursor: pointer; border: 1.5px solid;
    transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-wrong { background: var(--wrong-glow); border-color: var(--wrong); color: var(--wrong); }
  .btn-wrong:hover { background: rgba(247,106,106,0.25); }
  .btn-correct { background: rgba(93,232,164,0.12); border-color: var(--correct); color: var(--correct); }
  .btn-correct:hover { background: rgba(93,232,164,0.22); }

  .study-options { display: flex; gap: 10px; justify-content: center; }

  /* EDIT DECK VIEW */
  .edit-view {}
  .edit-toolbar { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .card-list { display: flex; flex-direction: column; gap: 10px; }
  .card-edit-item {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px; display: flex; gap: 12px; align-items: flex-start;
    transition: border-color 0.15s;
  }
  .card-edit-item:hover { border-color: var(--surface3); }
  .card-num { font-size: 13px; color: var(--text3); font-weight: 600; width: 28px; flex-shrink: 0; padding-top: 10px; text-align: center; }
  .card-fields { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .card-field {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 12px; color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 14px; resize: none; outline: none; transition: border-color 0.15s;
    min-height: 42px;
  }
  .card-field:focus { border-color: var(--accent); }
  .card-field::placeholder { color: var(--text3); }
  .card-delete-btn { background: transparent; border: none; color: var(--text3); cursor: pointer; font-size: 16px; padding: 6px; border-radius: 6px; flex-shrink: 0; margin-top: 6px; }
  .card-delete-btn:hover { color: var(--wrong); background: var(--wrong-glow); }
  .wrong-badge { font-size: 10px; background: var(--wrong-glow); color: var(--wrong); border: 1px solid rgba(247,106,106,0.3); padding: 2px 8px; border-radius: 100px; margin-left: 8px; }
  .correct-badge { font-size: 10px; background: rgba(93,232,164,0.1); color: var(--correct); border: 1px solid rgba(93,232,164,0.3); padding: 2px 8px; border-radius: 100px; margin-left: 8px; }

  /* CONTEXT MENU */
  .ctx-menu {
    position: fixed; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 6px; min-width: 160px;
    box-shadow: var(--shadow); z-index: 1000; display: none;
    animation: fadeIn 0.1s ease;
  }
  .ctx-menu.open { display: block; }
  .ctx-item {
    padding: 8px 12px; border-radius: 6px; font-size: 13px; cursor: pointer;
    display: flex; align-items: center; gap: 8px; color: var(--text);
    transition: background 0.1s;
  }
  .ctx-item:hover { background: var(--surface2); }
  .ctx-item.danger { color: var(--wrong); }
  .ctx-item.danger:hover { background: var(--wrong-glow); }
  .ctx-divider { height: 1px; background: var(--border); margin: 4px 0; }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
    z-index: 500; display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
    padding: 20px;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
    padding: 28px; width: 100%; max-width: 440px;
    transform: translateY(20px); transition: transform 0.2s;
    box-shadow: var(--shadow);
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-title { font-family: 'DM Serif Display', serif; font-size: 22px; margin-bottom: 8px; }
  .modal-sub { font-size: 13px; color: var(--text2); margin-bottom: 20px; }
  .modal-input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none;
    transition: border-color 0.15s; margin-bottom: 10px;
  }
  .modal-input:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }

  /* EMPTY STATES */
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text2); }
  .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
  .empty-title { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--text); margin-bottom: 8px; }
  .empty-sub { font-size: 14px; line-height: 1.6; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px);
    background: var(--surface); border: 1px solid var(--border); border-radius: 100px;
    padding: 10px 20px; font-size: 13px; font-weight: 500; z-index: 900;
    transition: transform 0.3s cubic-bezier(.4,0,.2,1), opacity 0.3s;
    opacity: 0; box-shadow: var(--shadow); display: flex; align-items: center; gap: 8px;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  .toast.success { border-color: var(--correct); }
  .toast.error { border-color: var(--wrong); }

  /* LOADING */
  .loading-screen {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; align-items: center; justify-content: center; flex-direction: column;
    z-index: 999; gap: 16px;
  }
  .loading-logo { font-family: 'DM Serif Display', serif; font-size: 36px; color: var(--accent2); }
  .loading-dots { display: flex; gap: 6px; }
  .loading-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 1.2s ease-in-out infinite; }
  .loading-dot:nth-child(2) { animation-delay: 0.2s; }
  .loading-dot:nth-child(3) { animation-delay: 0.4s; }

  /* DRAG & DROP VISUAL */
  .dragging { opacity: 0.4; }
  .drag-over { border: 2px dashed var(--accent) !important; }

  /* SESSION COMPLETE */
  .session-complete { text-align: center; padding: 40px 20px; }
  .session-icon { font-size: 64px; margin-bottom: 16px; }
  .session-title { font-family: 'DM Serif Display', serif; font-size: 32px; margin-bottom: 8px; }
  .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 24px 0; }
  .result-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
  .result-num { font-family: 'DM Serif Display', serif; font-size: 28px; }
  .result-label { font-size: 12px; color: var(--text2); margin-top: 4px; }

  /* MOBILE OVERLAY */
  .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9; backdrop-filter: blur(2px); }

  /* REORDER HANDLES */
  .drag-handle { cursor: grab; color: var(--text3); font-size: 14px; padding: 4px; flex-shrink: 0; }
  .drag-handle:active { cursor: grabbing; }

  @keyframes pulse { 0%,100%{opacity:0.3;transform:scale(0.8)} 50%{opacity:1;transform:scale(1)} }
  @keyframes fadeIn { from{opacity:0;transform:scale(0.95)} to{opacity:1;transform:scale(1)} }
  @keyframes slideUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    .sidebar {
      position: fixed; left: 0; top: 0; bottom: 0; transform: translateX(-100%);
      width: 280px; z-index: 10;
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar-overlay { display: block; pointer-events: none; opacity: 0; transition: opacity 0.3s; }
    .sidebar-overlay.open { pointer-events: all; opacity: 1; }
    .menu-btn { display: flex; }
    .main-content { padding: 16px; }
    .stats-row { grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .stat-card { padding: 12px 8px; }
    .stat-num { font-size: 24px; }
    .deck-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
    .flashcard-face { padding: 32px 24px; min-height: 200px; }
    .card-text { font-size: 22px; }
    .study-actions { gap: 10px; }
    .main-header { padding: 12px 16px; }
  }
  @media (max-width: 430px) {
    .stats-row { grid-template-columns: repeat(3,1fr); gap: 6px; }
    .stat-num { font-size: 20px; }
    .stat-label { font-size: 10px; }
    .deck-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
    .deck-card { padding: 14px; }
    .flashcard-face { padding: 28px 20px; min-height: 180px; }
    .card-text { font-size: 19px; }
    .study-actions { grid-template-columns: 1fr 1fr; }
    .answer-btn { padding: 14px; font-size: 14px; }
  }

  /* TABS in header */
  .view-tabs { display: flex; background: var(--surface2); border-radius: 8px; padding: 3px; gap: 2px; }
  .view-tab { padding: 6px 14px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; color: var(--text2); transition: background 0.15s, color 0.15s; }
  .view-tab.active { background: var(--accent); color: #fff; }

  .breadcrumb { font-size: 13px; color: var(--text2); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .breadcrumb-link { cursor: pointer; color: var(--text2); transition: color 0.15s; }
  .breadcrumb-link:hover { color: var(--accent2); }
  .breadcrumb-sep { color: var(--text3); }
  .breadcrumb-current { color: var(--text); font-weight: 500; }

  .wrong-section { background: linear-gradient(135deg, rgba(247,106,106,0.06), rgba(247,106,106,0.02)); border: 1px solid rgba(247,106,106,0.2); border-radius: var(--radius); padding: 16px; margin-bottom: 24px; }
  .wrong-section-title { font-size: 13px; font-weight: 600; color: var(--wrong); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .wrong-deck-pills { display: flex; flex-wrap: wrap; gap: 8px; }
  .wrong-pill { background: var(--wrong-glow); border: 1px solid rgba(247,106,106,0.3); border-radius: 100px; padding: 5px 12px; font-size: 12px; color: var(--wrong); cursor: pointer; transition: background 0.15s; }
  .wrong-pill:hover { background: rgba(247,106,106,0.2); }
</style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <div class="loading-logo">FlashDeck</div>
  <div class="loading-dots">
    <div class="loading-dot"></div>
    <div class="loading-dot"></div>
    <div class="loading-dot"></div>
  </div>
</div>

<div class="app" id="appRoot" style="display:none">
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div>
        <div class="logo">FlashDeck</div>
        <div style="font-size:11px;color:var(--text3);margin-top:2px">Study smarter</div>
      </div>
      <div class="sidebar-actions">
        <button class="icon-btn" title="New Folder" onclick="openNewFolderModal()">📁</button>
        <button class="icon-btn" title="New Deck" onclick="openNewDeckModal()">＋</button>
      </div>
    </div>

    <div class="folder-list" id="folderList"></div>

    <div style="padding:12px;border-top:1px solid var(--border)">
      <div id="authArea"></div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="main-header">
      <button class="icon-btn menu-btn" onclick="toggleSidebar()">☰</button>
      <div style="flex:1">
        <div class="main-title" id="mainTitle">FlashDeck</div>
        <div class="breadcrumb" id="breadcrumb"></div>
      </div>
      <div class="header-actions" id="headerActions"></div>
    </div>
    <div class="main-content" id="mainContent"></div>
  </main>
</div>

<!-- CONTEXT MENU -->
<div class="ctx-menu" id="ctxMenu">
  <div id="ctxItems"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalIfOuter(event)">
  <div class="modal" id="modal">

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot, collection, addDoc, deleteDoc, updateDoc, getDocs, writeBatch }
  from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
import { getAuth, signInAnonymously, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDk2Np8D7FkcTLLtR3sY0JRvRXrsi58ZDY",
  authDomain: "tune-6a7b5.firebaseapp.com",
  projectId: "tune-6a7b5",
  storageBucket: "tune-6a7b5.firebasestorage.app",
  messagingSenderId: "14662217624",
  appId: "1:14662217624:web:54746870d24713bc9705ed",
  measurementId: "G-9H0VMN285L"
};

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);
const auth = getAuth(fbApp);

// ── STATE ──────────────────────────────────────────────────────────────
let state = {
  uid: null,
  folders: [],     // [{id, name, order, color}]
  decks: [],       // [{id, name, folderId, order, cards:[{id,q,a,wrongCount,lastWrong}]}]
  currentView: 'home',   // home | study | edit | session_complete
  currentDeckId: null,
  currentCardIndex: 0,
  cardFlipped: false,
  sessionResults: { correct: 0, wrong: 0, wrongIds: [] },
  studyCards: [],  // shuffled subset
};

// ── AUTH ───────────────────────────────────────────────────────────────
onAuthStateChanged(auth, async user => {
  if (user) {
    state.uid = user.uid;
    document.getElementById('authArea').innerHTML =
      `<div style="font-size:11px;color:var(--text3);text-align:center">
        Synced · <span style="color:var(--accent2)">${user.uid.slice(0,8)}…</span>
       </div>`;
    await loadData();
    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('appRoot').style.display = 'flex';
    renderSidebar();
    showHome();
  } else {
    await signInAnonymously(auth);
  }
});

// ── FIRESTORE ─────────────────────────────────────────────────────────
async function loadData() {
  try {
    const userRef = doc(db, 'users', state.uid);
    const snap = await getDoc(userRef);
    if (snap.exists()) {
      const d = snap.data();
      state.folders = d.folders || [];
      state.decks   = d.decks   || [];
    } else {
      // seed with example data
      state.folders = [
        {id: uid(), name: 'Biology', order: 0, color: '#7c6af7'},
        {id: uid(), name: 'History',  order: 1, color: '#f76a6a'},
      ];
      const f1 = state.folders[0].id, f2 = state.folders[1].id;
      state.decks = [
        {id: uid(), name: 'Cell Structure', folderId: f1, order: 0,
          cards: [
            {id: uid(), q:'What is the powerhouse of the cell?', a:'Mitochondria', wrongCount:2, lastWrong: Date.now()},
            {id: uid(), q:'What controls what enters and exits the cell?', a:'Cell membrane', wrongCount:0},
            {id: uid(), q:'Which organelle contains DNA?', a:'Nucleus', wrongCount:1, lastWrong: Date.now()-86400000},
            {id: uid(), q:'What produces proteins?', a:'Ribosome', wrongCount:0},
          ]
        },
        {id: uid(), name: 'Photosynthesis', folderId: f1, order: 1,
          cards: [
            {id: uid(), q:'What pigment captures sunlight?', a:'Chlorophyll', wrongCount:0},
            {id: uid(), q:'What gas is released during photosynthesis?', a:'Oxygen', wrongCount:1, lastWrong: Date.now()},
          ]
        },
        {id: uid(), name: 'WWI Causes', folderId: f2, order: 0,
          cards: [
            {id: uid(), q:'What was the main alliance opposing the Triple Entente?', a:'The Triple Alliance (Germany, Austria-Hungary, Italy)', wrongCount:3, lastWrong: Date.now()},
            {id: uid(), q:'Assassination of which Archduke triggered WWI?', a:'Archduke Franz Ferdinand', wrongCount:0},
          ]
        },
      ];
      await saveData();
    }
  } catch(e) { console.error(e); showToast('Could not load data', 'error'); }
}

async function saveData() {
  try {
    await setDoc(doc(db, 'users', state.uid), {
      folders: state.folders,
      decks: state.decks,
      updatedAt: Date.now()
    });
  } catch(e) { console.error(e); showToast('Sync error', 'error'); }
}

function uid() { return Math.random().toString(36).slice(2,10) + Date.now().toString(36); }

// ── RENDER SIDEBAR ────────────────────────────────────────────────────
function renderSidebar() {
  const list = document.getElementById('folderList');
  const sorted = [...state.folders].sort((a,b) => a.order - b.order);
  list.innerHTML = '';

  if (sorted.length === 0) {
    list.innerHTML = `<div style="padding:20px;text-align:center;color:var(--text3);font-size:13px">No folders yet.<br>Create one to start.</div>`;
    return;
  }

  sorted.forEach(folder => {
    const folderDecks = state.decks.filter(d => d.folderId === folder.id).sort((a,b) => a.order - b.order);
    const wrongDecks  = folderDecks.filter(d => d.cards.some(c => c.wrongCount > 0));
    const isOpen = folder._open !== false;

    const item = document.createElement('div');
    item.className = 'folder-item';
    item.dataset.folderId = folder.id;

    item.innerHTML = `
      <div class="folder-header ${state.currentView !== 'home' ? '' : ''}" onclick="toggleFolder('${folder.id}')">
        <span class="folder-icon">📂</span>
        <span class="folder-name">${esc(folder.name)}</span>
        <span class="folder-meta">${folderDecks.length}</span>
        <span class="folder-chevron ${isOpen?'open':''}" id="chev-${folder.id}">▶</span>
        <span class="folder-dots" onclick="openFolderMenu(event,'${folder.id}')">⋯</span>
      </div>
      <div class="deck-list" id="dl-${folder.id}" style="display:${isOpen?'block':'none'}">
        ${folderDecks.map(deck => {
          const wrongCards = deck.cards.filter(c => c.wrongCount > 0);
          const isActive = state.currentDeckId === deck.id;
          return `
            <div class="deck-item ${isActive?'active':''}" id="di-${deck.id}" onclick="selectDeck('${deck.id}')">
              <span class="deck-dot ${wrongCards.length?'wrong':''}"></span>
              <span class="deck-name">${esc(deck.name)}</span>
              <span class="deck-count">${deck.cards.length}</span>
              <span class="deck-dots" onclick="openDeckMenu(event,'${deck.id}')">⋯</span>
            </div>
          `;
        }).join('')}
        ${wrongDecks.length ? `
          <div class="deck-item" onclick="studyWrongDeck('${folder.id}')" style="opacity:0.8">
            <span class="deck-dot wrong"></span>
            <span class="deck-name" style="color:var(--wrong);font-size:12px">⚠ Incorrect Cards</span>
            <span class="deck-count">${wrongDecks.reduce((s,d)=>s+d.cards.filter(c=>c.wrongCount>0).length,0)}</span>
          </div>` : ''}
      </div>
    `;
    list.appendChild(item);
  });
}

function toggleFolder(id) {
  const folder = state.folders.find(f => f.id === id);
  if (folder) {
    folder._open = folder._open === false ? true : false;
    const dl = document.getElementById('dl-'+id);
    const chev = document.getElementById('chev-'+id);
    if (dl) dl.style.display = folder._open === false ? 'none' : 'block';
    if (chev) chev.classList.toggle('open', folder._open !== false);
  }
}

// ── VIEWS ─────────────────────────────────────────────────────────────
function showHome() {
  state.currentView = 'home';
  state.currentDeckId = null;
  document.getElementById('mainTitle').textContent = 'FlashDeck';
  document.getElementById('breadcrumb').innerHTML = '';

  const totalCards  = state.decks.reduce((s,d)=>s+d.cards.length,0);
  const totalDecks  = state.decks.length;
  const totalWrong  = state.decks.reduce((s,d)=>s+d.cards.filter(c=>c.wrongCount>0).length,0);

  const hdrActions = document.getElementById('headerActions');
  hdrActions.innerHTML = `
    <button class="btn btn-secondary" onclick="openNewFolderModal()">📁 Folder</button>
    <button class="btn btn-primary" onclick="openNewDeckModal()">+ Deck</button>
  `;

  let wrongSection = '';
  const allWrongDecks = state.decks.filter(d => d.cards.some(c=>c.wrongCount>0));
  if (allWrongDecks.length) {
    const pills = allWrongDecks.map(d=>`<div class="wrong-pill" onclick="studyDeckById('${d.id}',true)">⚠ ${esc(d.name)} <strong>${d.cards.filter(c=>c.wrongCount>0).length}</strong></div>`).join('');
    wrongSection = `<div class="wrong-section"><div class="wrong-section-title">🔴 Cards to Review</div><div class="wrong-deck-pills">${pills}</div></div>`;
  }

  const sorted = [...state.folders].sort((a,b)=>a.order-b.order);
  const folderSections = sorted.map(folder => {
    const decks = state.decks.filter(d=>d.folderId===folder.id).sort((a,b)=>a.order-b.order);
    if (!decks.length) return '';
    const cards = decks.map(deck => {
      const w = deck.cards.filter(c=>c.wrongCount>0).length;
      return `
        <div class="deck-card ${w?'wrong-deck':''}" onclick="selectDeck('${deck.id}')">
          <div class="deck-card-name">${esc(deck.name)}</div>
          <div class="deck-card-meta">
            <span>${deck.cards.length} cards</span>
            <span>${folder.name}</span>
          </div>
          ${w?`<div class="deck-card-wrong">🔴 ${w} to review</div>`:''}
        </div>`;
    }).join('');
    return `<div style="margin-bottom:28px"><div class="section-title">📂 ${esc(folder.name)}</div><div class="deck-grid">${cards}</div></div>`;
  }).join('');

  document.getElementById('mainContent').innerHTML = `
    <div class="home-view">
      <div class="stats-row">
        <div class="stat-card"><div class="stat-num">${totalDecks}</div><div class="stat-label">Decks</div></div>
        <div class="stat-card"><div class="stat-num">${totalCards}</div><div class="stat-label">Cards</div></div>
        <div class="stat-card"><div class="stat-num" style="color:var(--wrong)">${totalWrong}</div><div class="stat-label">Review</div></div>
      </div>
      ${wrongSection}
      ${folderSections || `<div class="empty-state"><div class="empty-icon">🃏</div><div class="empty-title">No decks yet</div><div class="empty-sub">Create a folder and add your first deck to get started.</div></div>`}
    </div>`;
  renderSidebar();
  closeSidebar();
}

function selectDeck(deckId) {
  const deck = state.decks.find(d=>d.id===deckId);
  if (!deck) return;
  state.currentDeckId = deckId;
  state.currentView = 'deck';
  const folder = state.folders.find(f=>f.id===deck.folderId);
  document.getElementById('mainTitle').textContent = deck.name;
  document.getElementById('breadcrumb').innerHTML = `
    <span class="breadcrumb-link" onclick="showHome()">Home</span>
    <span class="breadcrumb-sep">›</span>
    <span class="breadcrumb-link" onclick="showHome()">${esc(folder?.name||'')}</span>
    <span class="breadcrumb-sep">›</span>
    <span class="breadcrumb-current">${esc(deck.name)}</span>`;

  document.getElementById('headerActions').innerHTML = `
    <div class="view-tabs">
      <div class="view-tab active" id="tab-overview" onclick="showDeckOverview()">Overview</div>
      <div class="view-tab" id="tab-edit" onclick="showEditDeck()">Edit</div>
    </div>
    <button class="btn btn-primary" onclick="startStudy('${deckId}',false)" style="margin-left:8px">▶ Study</button>
  `;

  showDeckOverview();
  renderSidebar();
  closeSidebar();
}

function showDeckOverview() {
  setActiveTab('tab-overview');
  const deck = state.decks.find(d=>d.id===state.currentDeckId);
  if (!deck) return;
  const wrongCards = deck.cards.filter(c=>c.wrongCount>0);
  const correctCards = deck.cards.filter(c=>c.wrongCount===0);
  const pct = deck.cards.length ? Math.round(correctCards.length/deck.cards.length*100) : 0;

  document.getElementById('mainContent').innerHTML = `
    <div style="max-width:600px;margin:0 auto">
      <div class="stats-row" style="margin-bottom:20px">
        <div class="stat-card"><div class="stat-num">${deck.cards.length}</div><div class="stat-label">Total</div></div>
        <div class="stat-card"><div class="stat-num" style="color:var(--correct)">${correctCards.length}</div><div class="stat-label">Mastered</div></div>
        <div class="stat-card"><div class="stat-num" style="color:var(--wrong)">${wrongCards.length}</div><div class="stat-label">Review</div></div>
      </div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:20px">
        <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--text2);margin-bottom:8px">
          <span>Mastery</span><span style="color:var(--text);font-weight:600">${pct}%</span>
        </div>
        <div class="progress-bar-wrap" style="margin-bottom:0;height:8px">
          <div class="progress-bar-fill" style="width:${pct}%"></div>
        </div>
      </div>
      <div style="display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap">
        <button class="btn btn-primary" onclick="startStudy('${deck.id}',false)" style="flex:1;justify-content:center">▶ Study All (${deck.cards.length})</button>
        ${wrongCards.length ? `<button class="btn btn-secondary" onclick="startStudy('${deck.id}',true)" style="flex:1;justify-content:center;border-color:var(--wrong);color:var(--wrong)">⚠ Review Wrong (${wrongCards.length})</button>` : ''}
      </div>
      <div class="section-title">All Cards</div>
      <div class="card-list">
        ${deck.cards.map((c,i)=>`
          <div class="card-edit-item" style="cursor:default">
            <div class="card-num">${i+1}</div>
            <div class="card-fields">
              <div style="font-size:14px;font-weight:500">${esc(c.q)}</div>
              <div style="font-size:13px;color:var(--text2);margin-top:4px">${esc(c.a)}</div>
            </div>
            <div style="display:flex;align-items:center;gap:4px;padding-top:8px">
              ${c.wrongCount>0 ? `<span class="wrong-badge">⚠ ${c.wrongCount}×</span>` : `<span class="correct-badge">✓</span>`}
            </div>
          </div>`).join('')}
      </div>
    </div>`;
}

function showEditDeck() {
  setActiveTab('tab-edit');
  const deck = state.decks.find(d=>d.id===state.currentDeckId);
  if (!deck) return;

  document.getElementById('mainContent').innerHTML = `
    <div class="edit-view">
      <div class="edit-toolbar">
        <button class="btn btn-secondary" onclick="addCard()">+ Add Card</button>
        <button class="btn btn-primary" onclick="saveDeckEdits()">💾 Save</button>
        <button class="btn btn-danger" onclick="confirmDeleteDeck('${deck.id}')">🗑 Delete Deck</button>
      </div>
      <div class="card-list" id="editCardList">
        ${deck.cards.map((c,i)=>`
          <div class="card-edit-item" data-card-id="${c.id}">
            <span class="drag-handle" draggable="false">⠿</span>
            <div class="card-num">${i+1}</div>
            <div class="card-fields">
              <textarea class="card-field" placeholder="Question…" data-type="q" data-id="${c.id}" rows="2">${esc(c.q)}</textarea>
              <textarea class="card-field" placeholder="Answer…" data-type="a" data-id="${c.id}" rows="2">${esc(c.a)}</textarea>
            </div>
            <button class="card-delete-btn" onclick="deleteCard('${c.id}')">✕</button>
          </div>`).join('')}
      </div>
    </div>`;

  // Auto-resize textareas
  document.querySelectorAll('.card-field').forEach(ta => {
    ta.style.height = ta.scrollHeight + 'px';
    ta.addEventListener('input', () => { ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px'; });
  });
}

function setActiveTab(tabId) {
  document.querySelectorAll('.view-tab').forEach(t => t.classList.toggle('active', t.id === tabId));
}

function addCard() {
  const deck = state.decks.find(d=>d.id===state.currentDeckId);
  if (!deck) return;
  deck.cards.push({id: uid(), q:'', a:'', wrongCount:0});
  showEditDeck();
  const items = document.querySelectorAll('.card-edit-item');
  if (items.length) items[items.length-1].scrollIntoView({behavior:'smooth'});
}

function deleteCard(cardId) {
  const deck = state.decks.find(d=>d.id===state.currentDeckId);
  if (!deck) return;
  if (deck.cards.length <= 1) { showToast('Need at least 1 card', 'error'); return; }
  deck.cards = deck.cards.filter(c=>c.id!==cardId);
  showEditDeck();
}

function saveDeckEdits() {
  const deck = state.decks.find(d=>d.id===state.currentDeckId);
  if (!deck) return;
  document.querySelectorAll('.card-edit-item').forEach(item => {
    const cardId = item.dataset.cardId;
    const card = deck.cards.find(c=>c.id===cardId);
    if (!card) return;
    const qEl = item.querySelector('[data-type="q"]');
    const aEl = item.querySelector('[data-type="a"]');
    if (qEl) card.q = qEl.value.trim();
    if (aEl) card.a = aEl.value.trim();
  });
  deck.cards = deck.cards.filter(c=>c.q||c.a);
  saveData().then(()=>{ showToast('Deck saved ✓', 'success'); showDeckOverview(); });
}

// ── STUDY ─────────────────────────────────────────────────────────────
function startStudy(deckId, wrongOnly) {
  const deck = state.decks.find(d=>d.id===deckId);
  if (!deck) return;
  let cards = wrongOnly ? deck.cards.filter(c=>c.wrongCount>0) : [...deck.cards];
  if (!cards.length) { showToast('No cards to study', 'error'); return; }
  // shuffle
  for (let i=cards.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[cards[i],cards[j]]=[cards[j],cards[i]]; }
  state.studyCards = cards;
  state.currentCardIndex = 0;
  state.cardFlipped = false;
  state.sessionResults = {correct:0, wrong:0, wrongIds:[]};
  state.currentDeckId = deckId;
  state.currentView = 'study';
  renderStudyCard();
}

function studyDeckById(id, wrongOnly) {
  selectDeck(id);
  setTimeout(()=>startStudy(id, wrongOnly),50);
}

function studyWrongDeck(folderId) {
  const folder = state.folders.find(f=>f.id===folderId);
  const folderDecks = state.decks.filter(d=>d.folderId===folderId);
  let wrongCards = [];
  folderDecks.forEach(deck => {
    deck.cards.filter(c=>c.wrongCount>0).forEach(c=>{
      wrongCards.push({...c, _deckId:deck.id});
    });
  });
  if (!wrongCards.length) { showToast('No wrong cards!', 'success'); return; }
  for (let i=wrongCards.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[wrongCards[i],wrongCards[j]]=[wrongCards[j],wrongCards[i]]; }
  state.studyCards = wrongCards;
  state.currentCardIndex = 0;
  state.cardFlipped = false;
  state.sessionResults = {correct:0, wrong:0, wrongIds:[]};
  state.currentView = 'study';
  document.getElementById('mainTitle').textContent = `${folder?.name||''} — Review`;
  document.getElementById('headerActions').innerHTML = `<button class="btn btn-secondary" onclick="showHome()">✕ Exit</button>`;
  renderStudyCard();
}

function renderStudyCard() {
  const total = state.studyCards.length;
  const i = state.currentCardIndex;
  if (i >= total) { showSessionComplete(); return; }
  const card = state.studyCards[i];
  const pct = (i/total)*100;

  const hdrActions = document.getElementById('headerActions');
  if (!hdrActions.innerHTML.includes('Exit')) {
    hdrActions.innerHTML = `<button class="btn btn-secondary" onclick="showHome()">✕ Exit</button>`;
  }

  document.getElementById('mainContent').innerHTML = `
    <div class="study-view">
      <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
      <div class="card-counter">Card <span>${i+1}</span> of <span>${total}</span></div>
      <div class="flashcard-wrap" onclick="flipCard()">
        <div class="flashcard-inner ${state.cardFlipped?'flipped':''}" id="flashcardInner">
          <div class="flashcard-face">
            <div class="card-hint">Question — tap to reveal</div>
            <div class="card-text">${esc(card.q)}</div>
          </div>
          <div class="flashcard-face flashcard-back">
            <div class="card-hint">Answer</div>
            <div class="card-text card-text-answer">${esc(card.a)}</div>
          </div>
        </div>
      </div>
      ${state.cardFlipped ? `
        <div class="study-actions">
          <button class="answer-btn btn-wrong" onclick="markCard(false)">✗ Got it Wrong</button>
          <button class="answer-btn btn-correct" onclick="markCard(true)">✓ Got it Right</button>
        </div>` : `
        <div style="text-align:center;color:var(--text3);font-size:13px">Tap the card to see the answer</div>`}
      <div class="study-options" style="margin-top:16px">
        <button class="btn btn-secondary" onclick="skipCard()">Skip →</button>
        ${i>0?`<button class="btn btn-secondary" onclick="prevCard()">← Back</button>`:''}
      </div>
    </div>`;
}

function flipCard() {
  state.cardFlipped = !state.cardFlipped;
  const inner = document.getElementById('flashcardInner');
  if (inner) inner.classList.toggle('flipped', state.cardFlipped);
  // Re-render to show answer buttons
  setTimeout(()=>renderStudyCard(), state.cardFlipped ? 0 : 0);
  renderStudyCard();
}

function markCard(correct) {
  const card = state.studyCards[state.currentCardIndex];
  const realCard = findRealCard(card.id, card._deckId || state.currentDeckId);
  if (realCard) {
    if (!correct) {
      realCard.wrongCount = (realCard.wrongCount||0) + 1;
      realCard.lastWrong = Date.now();
      state.sessionResults.wrongIds.push(card.id);
    } else {
      if (realCard.wrongCount > 0) realCard.wrongCount--;
    }
  }
  correct ? state.sessionResults.correct++ : state.sessionResults.wrong++;
  state.currentCardIndex++;
  state.cardFlipped = false;
  saveData();
  renderStudyCard();
}

function skipCard() {
  state.currentCardIndex++;
  state.cardFlipped = false;
  renderStudyCard();
}

function prevCard() {
  if (state.currentCardIndex > 0) {
    state.currentCardIndex--;
    state.cardFlipped = false;
    renderStudyCard();
  }
}

function findRealCard(cardId, deckId) {
  if (deckId) {
    const deck = state.decks.find(d=>d.id===deckId);
    if (deck) return deck.cards.find(c=>c.id===cardId);
  }
  for (const deck of state.decks) {
    const c = deck.cards.find(c=>c.id===cardId);
    if (c) return c;
  }
  return null;
}

function showSessionComplete() {
  state.currentView = 'session_complete';
  const {correct, wrong} = state.sessionResults;
  const total = correct + wrong;
  const pct = total ? Math.round(correct/total*100) : 0;
  document.getElementById('mainContent').innerHTML = `
    <div class="session-complete">
      <div class="session-icon">${pct>=80?'🎉':pct>=50?'💪':'📚'}</div>
      <div class="session-title">${pct>=80?'Great job!':pct>=50?'Good effort!':'Keep practicing!'}</div>
      <div style="color:var(--text2);font-size:14px">You scored ${pct}% in this session</div>
      <div class="result-grid">
        <div class="result-card"><div class="result-num" style="color:var(--correct)">${correct}</div><div class="result-label">Correct</div></div>
        <div class="result-card"><div class="result-num" style="color:var(--wrong)">${wrong}</div><div class="result-label">Wrong</div></div>
      </div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
        <button class="btn btn-primary" onclick="startStudy('${state.currentDeckId}',false)">Study Again</button>
        ${wrong>0?`<button class="btn btn-secondary" style="border-color:var(--wrong);color:var(--wrong)" onclick="startStudy('${state.currentDeckId}',true)">Review Wrong (${wrong})</button>`:''}
        <button class="btn btn-secondary" onclick="showHome()">Home</button>
      </div>
    </div>`;
}

// ── CONTEXT MENUS ─────────────────────────────────────────────────────
function openFolderMenu(e, folderId) {
  e.stopPropagation();
  const folder = state.folders.find(f=>f.id===folderId);
  if (!folder) return;
  showCtxMenu(e, [
    {icon:'✏️', label:'Rename', action:()=>renameFolder(folderId)},
    {icon:'📁', label:'Add Deck', action:()=>openNewDeckModal(folderId)},
    {divider:true},
    {icon:'↑', label:'Move Up', action:()=>moveFolderUp(folderId)},
    {icon:'↓', label:'Move Down', action:()=>moveFolderDown(folderId)},
    {divider:true},
    {icon:'🗑', label:'Delete Folder', danger:true, action:()=>confirmDeleteFolder(folderId)},
  ]);
}

function openDeckMenu(e, deckId) {
  e.stopPropagation();
  const deck = state.decks.find(d=>d.id===deckId);
  if (!deck) return;
  showCtxMenu(e, [
    {icon:'▶', label:'Study', action:()=>{selectDeck(deckId);startStudy(deckId,false)}},
    {icon:'✏️', label:'Rename', action:()=>renameDeck(deckId)},
    {icon:'📂', label:'Move to Folder', action:()=>moveDeckToFolder(deckId)},
    {divider:true},
    {icon:'↑', label:'Move Up', action:()=>moveDeckUp(deckId)},
    {icon:'↓', label:'Move Down', action:()=>moveDeckDown(deckId)},
    {divider:true},
    {icon:'🗑', label:'Delete Deck', danger:true, action:()=>confirmDeleteDeck(deckId)},
  ]);
}

let ctxClose = null;
function showCtxMenu(e, items) {
  const menu = document.getElementById('ctxMenu');
  const ctxItems = document.getElementById('ctxItems');
  ctxItems.innerHTML = items.map((item,i) => {
    if (item.divider) return `<div class="ctx-divider"></div>`;
    return `<div class="ctx-item ${item.danger?'danger':''}" data-idx="${i}">${item.icon} ${item.label}</div>`;
  }).join('');
  menu.querySelectorAll('.ctx-item').forEach(el => {
    const idx = parseInt(el.dataset.idx);
    if (!isNaN(idx) && items[idx]?.action) el.addEventListener('click', ()=>{ hideCtxMenu(); items[idx].action(); });
  });
  const r = { x: e.clientX, y: e.clientY };
  menu.style.left = Math.min(r.x, window.innerWidth-180)+'px';
  menu.style.top  = Math.min(r.y, window.innerHeight-items.length*36-20)+'px';
  menu.classList.add('open');
  if (ctxClose) document.removeEventListener('click', ctxClose);
  ctxClose = ()=>hideCtxMenu();
  setTimeout(()=>document.addEventListener('click', ctxClose), 10);
}
function hideCtxMenu() { document.getElementById('ctxMenu').classList.remove('open'); }

// ── MODALS ────────────────────────────────────────────────────────────
function openModal(title, sub, bodyHtml, actions) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalSub').textContent = sub||'';
  document.getElementById('modalBody').innerHTML = bodyHtml||'';
  document.getElementById('modalActions').innerHTML = actions||'';
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(()=>{ const inp = document.querySelector('#modalBody .modal-input'); if(inp) inp.focus(); },100);
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function closeModalIfOuter(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }

function openNewFolderModal(parentId) {
  openModal('New Folder', 'Give your folder a name',
    `<input class="modal-input" id="mInput" placeholder="e.g. Biology, Math, History…" maxlength="40" onkeydown="if(event.key==='Enter')submitNewFolder()">`,
    `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
     <button class="btn btn-primary" onclick="submitNewFolder()">Create</button>`);
}
function submitNewFolder() {
  const val = document.getElementById('mInput')?.value.trim();
  if (!val) return;
  const folder = {id: uid(), name: val, order: state.folders.length, _open: true};
  state.folders.push(folder);
  saveData(); closeModal(); renderSidebar(); showToast('Folder created');
}

function openNewDeckModal(folderId) {
  const folderOpts = state.folders.map(f=>`<option value="${f.id}" ${f.id===folderId?'selected':''}>${esc(f.name)}</option>`).join('');
  openModal('New Deck', 'Name your deck and select a folder',
    `<input class="modal-input" id="mInput" placeholder="Deck name…" maxlength="50" onkeydown="if(event.key==='Enter')submitNewDeck()">
     <select class="modal-input" id="mFolder" style="cursor:pointer">
       ${folderOpts||'<option value="">No folders — create one first</option>'}
     </select>`,
    `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
     <button class="btn btn-primary" onclick="submitNewDeck()">Create</button>`);
}
function submitNewDeck() {
  const name = document.getElementById('mInput')?.value.trim();
  const fId  = document.getElementById('mFolder')?.value;
  if (!name || !fId) { showToast('Fill in all fields', 'error'); return; }
  const deck = {id:uid(), name, folderId:fId, order:state.decks.filter(d=>d.folderId===fId).length,
    cards:[{id:uid(),q:'Question 1',a:'Answer 1',wrongCount:0}]};
  state.decks.push(deck);
  saveData(); closeModal(); renderSidebar(); selectDeck(deck.id); showEditDeck();
}

function renameFolder(id) {
  const folder = state.folders.find(f=>f.id===id);
  openModal('Rename Folder','',
    `<input class="modal-input" id="mInput" value="${esc(folder.name)}" maxlength="40" onkeydown="if(event.key==='Enter')submitRenameFolder('${id}')">`,
    `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
     <button class="btn btn-primary" onclick="submitRenameFolder('${id}')">Rename</button>`);
}
function submitRenameFolder(id) {
  const val = document.getElementById('mInput')?.value.trim();
  if (!val) return;
  const folder = state.folders.find(f=>f.id===id);
  folder.name = val;
  saveData(); closeModal(); renderSidebar(); if(state.currentView==='home') showHome();
}

function renameDeck(id) {
  const deck = state.decks.find(d=>d.id===id);
  openModal('Rename Deck','',
    `<input class="modal-input" id="mInput" value="${esc(deck.name)}" maxlength="50" onkeydown="if(event.key==='Enter')submitRenameDeck('${id}')">`,
    `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
     <button class="btn btn-primary" onclick="submitRenameDeck('${id}')">Rename</button>`);
}
function submitRenameDeck(id) {
  const val = document.getElementById('mInput')?.value.trim();
  if (!val) return;
  const deck = state.decks.find(d=>d.id===id);
  deck.name = val;
  saveData(); closeModal(); renderSidebar();
  if (state.currentDeckId===id) document.getElementById('mainTitle').textContent = val;
}

function moveDeckToFolder(deckId) {
  const deck = state.decks.find(d=>d.id===deckId);
  const opts = state.folders.map(f=>`<option value="${f.id}" ${f.id===deck.folderId?'selected':''}>${esc(f.name)}</option>`).join('');
  openModal('Move Deck', `Moving "${deck.name}"`,
    `<select class="modal-input" id="mFolder" style="cursor:pointer">${opts}</select>`,
    `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
     <button class="btn btn-primary" onclick="submitMoveDeck('${deckId}')">Move</button>`);
}
function submitMoveDeck(deckId) {
  const fId = document.getElementById('mFolder')?.value;
  const deck = state.decks.find(d=>d.id===deckId);
  deck.folderId = fId;
  deck.order = state.decks.filter(d=>d.folderId===fId&&d.id!==deckId).length;
  saveData(); closeModal(); renderSidebar(); showToast('Deck moved');
}

function confirmDeleteFolder(id) {
  const folder = state.folders.find(f=>f.id===id);
  const n = state.decks.filter(d=>d.folderId===id).length;
  openModal('Delete Folder', `Delete "${folder.name}"? This will also delete ${n} deck(s) inside.`, '',
    `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
     <button class="btn btn-danger" onclick="deleteFolder('${id}')">Delete</button>`);
}
function deleteFolder(id) {
  state.folders = state.folders.filter(f=>f.id!==id);
  state.decks   = state.decks.filter(d=>d.folderId!==id);
  saveData(); closeModal(); renderSidebar(); showHome();
}

function confirmDeleteDeck(id) {
  const deck = state.decks.find(d=>d.id===id);
  openModal('Delete Deck', `Delete "${deck.name}"? This cannot be undone.`, '',
    `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
     <button class="btn btn-danger" onclick="deleteDeck('${id}')">Delete</button>`);
}
function deleteDeck(id) {
  state.decks = state.decks.filter(d=>d.id!==id);
  saveData(); closeModal(); renderSidebar(); showHome();
}

// ── REORDER ───────────────────────────────────────────────────────────
function moveFolderUp(id) {
  const idx = state.folders.findIndex(f=>f.id===id);
  if (idx<=0) return;
  [state.folders[idx-1].order, state.folders[idx].order] = [state.folders[idx].order, state.folders[idx-1].order];
  saveData(); renderSidebar();
}
function moveFolderDown(id) {
  const idx = state.folders.findIndex(f=>f.id===id);
  if (idx>=state.folders.length-1) return;
  [state.folders[idx+1].order, state.folders[idx].order] = [state.folders[idx].order, state.folders[idx+1].order];
  saveData(); renderSidebar();
}
function moveDeckUp(id) {
  const deck = state.decks.find(d=>d.id===id);
  const peers = state.decks.filter(d=>d.folderId===deck.folderId).sort((a,b)=>a.order-b.order);
  const idx = peers.findIndex(d=>d.id===id);
  if (idx<=0) return;
  [peers[idx-1].order, peers[idx].order] = [peers[idx].order, peers[idx-1].order];
  saveData(); renderSidebar();
}
function moveDeckDown(id) {
  const deck = state.decks.find(d=>d.id===id);
  const peers = state.decks.filter(d=>d.folderId===deck.folderId).sort((a,b)=>a.order-b.order);
  const idx = peers.findIndex(d=>d.id===id);
  if (idx>=peers.length-1) return;
  [peers[idx+1].order, peers[idx].order] = [peers[idx].order, peers[idx+1].order];
  saveData(); renderSidebar();
}

// ── TOAST ─────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2500);
}

// ── SIDEBAR MOBILE ────────────────────────────────────────────────────
function toggleSidebar() {
  const s = document.getElementById('sidebar');
  const o = document.getElementById('sidebarOverlay');
  s.classList.toggle('open');
  o.classList.toggle('open');
}
function closeSidebar() {
  if (window.innerWidth <= 768) {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('open');
  }
}

// ── KEYBOARD ──────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (state.currentView !== 'study') return;
  if (e.key === ' ' || e.key === 'ArrowUp') { e.preventDefault(); flipCard(); }
  if (e.key === 'ArrowRight') skipCard();
  if (e.key === 'ArrowLeft') prevCard();
  if (state.cardFlipped) {
    if (e.key === 'ArrowDown' || e.key === '1') markCard(false);
    if (e.key === 'Enter' || e.key === '2') markCard(true);
  }
});

// ── HELPERS ───────────────────────────────────────────────────────────
function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// Make functions global
window.showHome = showHome;
window.selectDeck = selectDeck;
window.showDeckOverview = showDeckOverview;
window.showEditDeck = showEditDeck;
window.addCard = addCard;
window.deleteCard = deleteCard;
window.saveDeckEdits = saveDeckEdits;
window.startStudy = startStudy;
window.studyDeckById = studyDeckById;
window.studyWrongDeck = studyWrongDeck;
window.flipCard = flipCard;
window.markCard = markCard;
window.skipCard = skipCard;
window.prevCard = prevCard;
window.openFolderMenu = openFolderMenu;
window.openDeckMenu = openDeckMenu;
window.openNewFolderModal = openNewFolderModal;
window.openNewDeckModal = openNewDeckModal;
window.submitNewFolder = submitNewFolder;
window.submitNewDeck = submitNewDeck;
window.renameFolder = renameFolder;
window.submitRenameFolder = submitRenameFolder;
window.renameDeck = renameDeck;
window.submitRenameDeck = submitRenameDeck;
window.moveDeckToFolder = moveDeckToFolder;
window.submitMoveDeck = submitMoveDeck;
window.confirmDeleteFolder = confirmDeleteFolder;
window.deleteFolder = deleteFolder;
window.confirmDeleteDeck = confirmDeleteDeck;
window.deleteDeck = deleteDeck;
window.closeModal = closeModal;
window.closeModalIfOuter = closeModalIfOuter;
window.toggleFolder = toggleFolder;
window.toggleSidebar = toggleSidebar;
window.closeSidebar = closeSidebar;
window.moveFolderUp = moveFolderUp;
window.moveFolderDown = moveFolderDown;
window.moveDeckUp = moveDeckUp;
window.moveDeckDown = moveDeckDown;

</script>
